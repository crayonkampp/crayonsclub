<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crayon Club Sidebar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
}

/* Main Sidebar */

.sidebar{
    width:100%;
    min-height:100%;
    background:linear-gradient(180deg,#240000,#100000);
    border:2px solid #7b0000;
    border-radius:16px;
    overflow:hidden;
    box-shadow:
        0 0 25px rgba(170,0,0,.45),
        inset 0 0 20px rgba(255,0,0,.08);
}


/* Profile */

.profile{
    text-align:center;
    padding:22px 15px;
    background:linear-gradient(180deg,#420000,#1a0000);
    border-bottom:2px solid #7b0000;
}

.profile img{
    width:95px;
    height:95px;
    border-radius:50%;
    border:4px solid #a00000;
    transition:.35s;
}

.profile img:hover{
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,40,40,.75);
}


.profile h2{
    margin-top:12px;
    color:#ffffff;
    font-size:23px;
    letter-spacing:1px;
}


.profile a{
    color:#ff5d5d;
    text-decoration:none;
    font-size:14px;
    transition:.3s;
}


.profile a:hover{
    color:white;
}


/* Buttons */

.menu{
    padding:15px;
}


.menu a{
    display:block;
    padding:13px;
    margin-bottom:12px;

    text-align:center;
    text-decoration:none;

    background:linear-gradient(180deg,#850000,#520000);

    color:white;

    border:1px solid #b50000;
    border-radius:12px;

    font-weight:bold;
    letter-spacing:.8px;

    transition:.25s;
}


.menu a:hover{
    transform:translateY(-3px) scale(1.03);

    background:linear-gradient(180deg,#c00000,#780000);

    box-shadow:
        0 0 18px rgba(255,0,0,.55),
        inset 0 0 8px rgba(255,255,255,.12);
}

</style>

</head>

<body>

<div class="sidebar">

    <div class="profile">

        <a href="https://www.chess.com/member/crayon" target="_blank">
            <img src="https://images.chesscomfiles.com/uploads/v1/user/240765061.4d0c5217.200x200o.00458b37a56d.jpg">
        </a>

        <h2>crayon</h2>

        <a href="https://www.chess.com/member/crayon" target="_blank">
            View Profile
        </a>

    </div>


    <div class="menu">

        <a href="https://www.chess.com/clubs/forum/view/rules-version-2-0" target="_blank">
            📜 Rules
        </a>

    </div>

</div>

</body>
</html>
