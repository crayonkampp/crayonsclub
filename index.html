<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crayon's Club Sidebar</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:#100000;
    overflow:hidden;
}

/* Sidebar */

.sidebar{
    width:100%;
    min-height:100%;
    background:linear-gradient(180deg,#240000,#100000);
    border:2px solid #7b0000;
    border-radius:16px;
    overflow:hidden;
    box-shadow:
        0 0 25px rgba(170,0,0,.45),
        inset 0 0 20px rgba(255,0,0,.08);
}

/* Owner */

.profile{
    text-align:center;
    padding:22px 15px;
    background:linear-gradient(180deg,#420000,#1a0000);
    border-bottom:2px solid #7b0000;
}

.profile img{
    width:95px;
    height:95px;
    border-radius:50%;
    border:4px solid #a00000;
    transition:.35s;
}

.profile img:hover{
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,40,40,.75);
}

.profile h2{
    margin-top:12px;
    color:#fff;
    font-size:23px;
}

.profile a{
    color:#ff5d5d;
    text-decoration:none;
}

.profile a:hover{
    color:#fff;
}

/* Member Cards */

.featured{
    margin:18px;
    padding:15px;
    text-align:center;
    background:linear-gradient(180deg,#2d0000,#180000);
    border:1px solid #7b0000;
    border-radius:14px;
    transition:.3s;
}

.featured:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 18px rgba(255,0,0,.55);
}

.featured h3{
    color:#ff5555;
    margin-bottom:12px;
    letter-spacing:1px;
}

.featured img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid #a00000;
    transition:.3s;
}

.featured img:hover{
    transform:scale(1.08);
}

.featured .name{
    color:white;
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}

.featured .link{
    color:#ff6666;
    text-decoration:none;
}

.featured .link:hover{
    color:white;
}

/* Buttons */

.menu{
    padding:0 15px 15px;
}

.menu a{
    display:block;
    text-align:center;
    padding:13px;
    margin-bottom:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(180deg,#850000,#520000);
    border:1px solid #b50000;
    border-radius:12px;
    font-weight:bold;
    transition:.25s;
}

.menu a:hover{
    transform:translateY(-3px) scale(1.03);
    background:linear-gradient(180deg,#c00000,#780000);
    box-shadow:
        0 0 18px rgba(255,0,0,.55),
        inset 0 0 8px rgba(255,255,255,.12);
}

.footer{
    text-align:center;
    padding:12px;
    color:#888;
    font-size:11px;
    border-top:1px solid #4b0000;
}

</style>
</head>
