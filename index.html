<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viltrum Empire Sidebar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:transparent;
}

/* Sidebar */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#240000,#120000);
    border:2px solid #7b0000;
    border-radius:16px;
    overflow:hidden;
    box-shadow:
        0 0 25px rgba(170,0,0,.45),
        inset 0 0 20px rgba(255,0,0,.08);
}

/* Profile */

.profile{
    text-align:center;
    padding:28px 18px;
    background:linear-gradient(180deg,#420000,#1a0000);
    border-bottom:2px solid #7b0000;
}

.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #a00000;
    transition:.35s;
}

.profile img:hover{
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,40,40,.75);
}

.profile h2{
    margin-top:16px;
    font-size:24px;
    color:#fff;
    letter-spacing:1px;
}

.profile a{
    text-decoration:none;
    color:#ff5d5d;
    font-size:14px;
    transition:.3s;
}

.profile a:hover{
    color:#ffffff;
}

/* Buttons */

.menu{
    padding:20px;
}

.menu a{
    display:block;
    text-decoration:none;
    margin-bottom:15px;
    padding:14px;
    text-align:center;

    background:linear-gradient(180deg,#850000,#520000);
    color:#fff;

    border:1px solid #b50000;
    border-radius:12px;

    font-weight:bold;
    letter-spacing:.8px;

    transition:.25s;
}

.menu a:hover{
    transform:translateY(-3px) scale(1.03);
    background:linear-gradient(180deg,#c00000,#780000);
    box-shadow:
        0 0 18px rgba(255,0,0,.55),
        inset 0 0 8px rgba(255,255,255,.12);
}
</style>

</head>

<body>

<div class="sidebar">

    <div class="profile">

        <a href="https://www.chess.com/member/crayon" target="_blank">
            <img src="https://images.chesscomfiles.com/uploads/v1/user/240765061.4d0c5217.200x200o.00458b37a56d.jpg" alt="Profile">
        </a>

        <h2>crayon</h2>

        <a href="https://www.chess.com/member/crayon" target="_blank">
            View Profile
        </a>

    </div>

    <div class="menu">

        <a href="https://www.chess.com/clubs/forum/view/rules-version-2-0" target="_blank">
            📜 Rules
        </a>

    </div>

</div>

</body>
</html>

    <script src="script.js"></script>
</body>
</html>
