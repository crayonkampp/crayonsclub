<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Club - Chess.com Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .profile-header {
            margin-bottom: 30px;
        }

        #profilePic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid #667eea;
            object-fit: cover;
        }

        #profileName {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #viewCount {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .button-text {
            display: block;
        }

        .error-message {
            color: red;
            padding: 10px;
            background: #ffe0e0;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img id="profilePic" src="" alt="Profile Picture">
            <h1 id="profileName">Loading...</h1>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Followers</div>
                <div id="viewCount">0</div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-button">
                <span class="button-text">Play</span>
            </button>
            <button class="nav-button">
                <span class="button-text">Stats</span>
            </button>
            <button class="nav-button">
                <span class="button-text">Puzzles</span>
            </button>
            <button class="nav-button">
                <span class="button-text">Followers</span>
            </button>
            <button class="nav-button">
                <span class="button-text">Settings</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
